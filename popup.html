<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Job Autofill</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        width: 360px;
        background: #0f172a;
        color: #e2e8f0;
      }

      .wrap {
        padding: 14px;
      }

      h1 {
        font-size: 16px;
        margin: 0 0 12px;
      }

      label {
        display: block;
        font-size: 12px;
        margin: 10px 0 6px;
        color: #cbd5e1;
      }

      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #334155;
        background: #111827;
        color: #f8fafc;
        border-radius: 8px;
        padding: 10px;
        font-size: 12px;
      }

      textarea {
        min-height: 120px;
        resize: vertical;
      }

      .row {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        font-weight: 600;
      }

      button.primary {
        background: #22c55e;
        color: #04130a;
      }

      button.secondary {
        background: #1e293b;
        color: #e2e8f0;
      }

      .status {
        margin-top: 12px;
        font-size: 12px;
        color: #cbd5e1;
      }

      .results {
        margin-top: 10px;
        max-height: 160px;
        overflow: auto;
        border-top: 1px solid #1e293b;
        padding-top: 8px;
      }

      .result {
        font-size: 11px;
        padding: 6px 0;
        border-bottom: 1px solid #1e293b;
      }

      .result.error {
        color: #fca5a5;
      }

      .result.success {
        color: #86efac;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Job Autofill</h1>
      <label for="appUrl">Add Job page URL</label>
      <input id="appUrl" type="text" placeholder="https://your-app.vercel.app/user/jobs" />

      <label for="profileName">Profile name (optional)</label>
      <input id="profileName" type="text" placeholder="Exact profile name from the dropdown" />

      <label for="inputMode">Input type</label>
      <select id="inputMode">
        <option value="job-links">Job links</option>
        <option value="job-applications">Job applications JSON</option>
      </select>

      <label for="jobInput" id="jobInputLabel">Job links</label>
      <textarea id="jobInput" placeholder="One job link per line"></textarea>

      <div class="row">
        <button id="startBtn" class="primary">Start</button>
        <button id="stopBtn" class="secondary">Stop</button>
      </div>

      <div id="status" class="status">Idle.</div>
      <div id="results" class="results"></div>
    </div>

    <script src="popup.js"></script>
  </body>
  </html>
